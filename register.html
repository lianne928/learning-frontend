<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merge - 註冊</title>
  <link rel="stylesheet" href="./assets/scss/all.scss" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
  <header class="border-bottom py-2">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex">
          <a href="index.html" class="text-decoration-none">
            <h1 class="nunito fst-italic display-5 pt-2">Merge</h1>
          </a>
        </div>
        <nav class="ms-auto pt-2">
          <ul class="list-unstyled d-flex">
            <li>
              <a href="#" class="text-decoration-none px-3 ms-auto">我要找學生</a>
            </li>
            <li>
              <a href="explore.html" class="text-decoration-none px-3">我要找老師</a>
            </li>
            <li>
              <a href="register.html" class="text-decoration-none px-3 text-success fw-bold">註冊送代幣</a>
            </li>
            <li id="auth-nav-item">
              <a href="login.html" class="text-decoration-none px-3 pe-0 text-primary fw-bold">LOGIN</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main class="pb-5">
    <div class="bg-line border-bottom">
      <h2 class="sansTitle text-center pt-5 text-drak">REGISTER</h2>
    </div>

    <section class="container">
      <div class="row justify-content-center mt-4">
        <div class="col-11 col-md-5 card border-0 shadow-lg rounded-4 mb-3">
          <div class="card-body d-flex justify-content-center align-items-center flex-column position-relative">
            <div
              class="bg-dark rounded-circle border border-2 border-dark position-absolute top-0 start-50 translate-middle d-flex align-items-center justify-content-center shadow"
              style="width: 130px; height: 130px; overflow: hidden">
              <dotlottie-wc src="https://lottie.host/3ad56864-47bd-490b-92ab-25274f9773d5/R3RFdr3ZjP.lottie"
                style="width: 140px; height: 150px" autoplay loop></dotlottie-wc>
            </div>

            <form class="mt-5 pt-4 w-100" id="registerForm">
              <!-- 姓名 -->
              <div class="mb-3">
                <label for="nameInput" class="form-label">姓名</label>
                <input type="text" class="form-control" id="nameInput" placeholder="請輸入你的姓名" required />
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="emailInput" class="form-label">信箱</label>
                <input type="email" class="form-control" id="emailInput" placeholder="請輸入你的信箱" required />
              </div>

              <!-- 密碼 -->
              <div class="mb-3">
                <label for="passwordInput" class="form-label">密碼</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="至少 8 個字元" minlength="8" required />
              </div>

              <!-- 確認密碼 -->
              <div class="mb-3">
                <label for="confirmPasswordInput" class="form-label">確認密碼</label>
                <input type="password" class="form-control" id="confirmPasswordInput" placeholder="再輸入一次密碼" required />
                <div class="invalid-feedback" id="passwordMismatch">密碼不一致，請重新確認</div>
              </div>

              <!-- 生日 -->
              <div class="mb-3">
                <label for="birthdayInput" class="form-label">生日</label>
                <input type="date" class="form-control" id="birthdayInput" />
              </div>

              <!-- 身份 -->
              <div class="mb-4">
                <label class="form-label">我的身份</label>
                <div class="d-flex gap-2 justify-content-center">
                  <input type="radio" class="btn-check" name="role" id="roleStudent" value="STUDENT" checked />
                  <label class="btn btn-outline-primary btn-sm px-3" for="roleStudent">
                    <span class="fw-bold">🎓 學生</span>
                     <div class="text-muted small">我想找老師學習</div>
                  </label>

                  <input type="radio" class="btn-check" name="role" id="roleTutor" value="TUTOR" />
                  <label class="btn btn-outline-primary btn-sm px-3" for="roleTutor">
                    <span class="fw-bold">👨‍🏫 老師</span>
                     <div class="text-muted small">我想要開課教學</div>
                  </label>
                </div>
              </div>

              <button type="submit" class="btn w-100" id="registerBtn" style="background-color: rgb(126, 233, 76);">
                立即註冊 🎉
              </button>

              <p class="text-center mt-3 small text-muted">
                已有帳號？<a href="login.html" class="text-primary fw-bold text-decoration-none">前往登入</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-white border-top py-5 mt-auto">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
          <a href="index.html"
            class="text-decoration-none d-flex align-items-center justify-content-center justify-content-md-start">
            <h3 class="nunito fst-italic mb-0 me-2 text-primary">Merge</h3>
            <span class="text-muted small">&copy; 2026</span>
          </a>
        </div>
        <div class="col-md-4 mb-3 mb-md-0">
          <ul class="list-unstyled d-flex justify-content-center mb-0 small">
            <li>
              <a href="#" class="text-muted text-decoration-none px-2">服務條款</a>
            </li>
            <li>
              <a href="#" class="text-muted text-decoration-none px-2">隱私政策</a>
            </li>
            <li>
              <a href="#" class="text-muted text-decoration-none px-2">聯絡我們</a>
            </li>
          </ul>
        </div>
        <div class="col-md-4 text-center text-md-end">
          <a href="#" class="text-muted me-3"><i class="bi bi-facebook"></i></a>
          <a href="#" class="text-muted me-3"><i class="bi bi-instagram"></i></a>
          <a href="#" class="text-muted"><i class="bi bi-github"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="./assets/js/register.js"></script>

</body>

</html>
