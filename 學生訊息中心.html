<!doctype html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merge - 訊息中心</title>
  <link rel="stylesheet" href="./assets/scss/all.scss" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    /* ── 聯絡人列表 ── */
    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #e2e8f0;
      transition: background 0.15s;
    }
    .contact-item:hover  { background: #f8fafc; }
    .contact-item.active { background: #FFF7E6; }

    .contact-avatar-wrap { position: relative; flex-shrink: 0; }
    .contact-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e2e8f0;
    }
    .contact-status-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid #fff;
    }

    .contact-info     { flex: 1; min-width: 0; }
    .contact-top      { display: flex; justify-content: space-between; align-items: center; }
    .contact-name     { font-weight: 700; font-size: 0.88rem; color: #1e293b; }
    .contact-time     { font-size: 0.72rem; color: #94a3b8; white-space: nowrap; }
    .contact-bottom   { display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
    .contact-last     { font-size: 0.78rem; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    .contact-badge    { background: #ef4444; color: #fff; font-size: 0.65rem; font-weight: 700; border-radius: 10px; padding: 1px 6px; flex-shrink: 0; }
    .contact-subject  { font-size: 0.7rem; color: #FB923C; font-weight: 600; margin-top: 2px; }

    /* ── 聊天視窗 ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
    }
    .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .chat-header-info .chat-teacher-name { font-weight: 700; font-size: 0.9rem; color: #1e293b; }
    .chat-header-info .subject-tag {
      font-size: 0.72rem; font-weight: 600;
      background: #FFF7E6; color: #FB923C;
      border-radius: 6px; padding: 1px 8px;
      display: inline-block; margin-top: 2px;
    }

    #chat-messages {
      height: 400px;
      overflow-y: auto;
      padding: 20px 16px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #chat-messages::-webkit-scrollbar       { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .msg-row        { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row--me    { flex-direction: row-reverse; }
    .msg-avatar     { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

    .msg-bubble {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.88rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-bubble--teacher {
      background: #fff;
      color: #1e293b;
      border-radius: 4px 18px 18px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .msg-bubble--me {
      background: linear-gradient(135deg, #FB923C, #f97316);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .msg-time { font-size: 0.65rem; margin-top: 4px; opacity: 0.6; text-align: right; }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      resize: none;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.88rem;
      max-height: 100px;
      outline: none;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: #FB923C; }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #FB923C, #f97316);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .send-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    .send-btn:active { transform: scale(0.95); }

    /* ── 手機：聯絡人/聊天面板切換 ── */
    @media (max-width: 767px) {
      .contacts-panel--hidden { display: none !important; }
      .chat-panel--visible    { display: flex !important; flex-direction: column; }
      #chat-messages          { height: calc(100vh - 340px); }
    }
  </style>
</head>

<body style="padding-top: 70px">

  <!-- ===== Header（同 explore.html）===== -->
  <header class="border-bottom py-2 fixed-top navbar-light bg-light">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex">
          <a href="index.html" class="text-decoration-none">
            <h1 class="nunito fst-italic display-5 pt-2">Merge</h1>
          </a>
        </div>
        <nav class="ms-auto pt-2">
          <ul class="list-unstyled d-flex align-items-center mb-0">
            <li>
              <a href="#" class="text-decoration-none px-3 ms-auto">我要找學生</a>
            </li>
            <li>
              <a href="explore.html" class="text-decoration-none px-3">我要找老師</a>
            </li>
            <li>
              <a href="#" class="text-decoration-none px-3">註冊送代幣</a>
            </li>
            <li id="auth-nav-item">
              <a href="login.html" class="text-decoration-none px-3 pe-0 text-primary fw-bold">LOGIN</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main class="pb-5">

    <!-- 頁面標題（同 login.html 的 bg-line 區塊）-->
    <div class="bg-line border-bottom">
      <h2 class="sansTitle text-center pt-5">訊息中心</h2>
      <p class="text-center text-muted pb-3">與你的老師保持聯絡</p>
    </div>

    <!-- 主體內容 -->
    <section class="container mt-4">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="row g-0" style="min-height: 560px;">

          <!-- 左：聯絡人列表 -->
          <div class="col-12 col-md-4 border-end d-flex flex-column" id="contacts-panel">

            <!-- 搜尋欄 -->
            <div class="p-3 border-bottom bg-white">
              <input type="text" id="search-input" class="form-control rounded-3"
                placeholder="搜尋老師或科目…">
            </div>

            <!-- 對話清單 -->
            <div id="contact-list" class="overflow-y-auto flex-grow-1 bg-white"></div>
          </div>

          <!-- 右：聊天視窗 -->
          <div class="col-12 col-md-8 d-flex flex-column" id="chat-panel">

            <!-- 聊天 Header -->
            <div class="chat-header">
              <!-- 返回按鈕（手機版）-->
              <button class="btn btn-link p-0 me-1 d-md-none text-secondary" id="chat-back-btn">&#8592;</button>
              <img src="" alt="" class="chat-header-avatar" id="chat-teacher-avatar">
              <div class="chat-header-info">
                <div class="chat-teacher-name" id="chat-teacher-name">—</div>
                <div class="subject-tag" id="chat-subject-tag">—</div>
              </div>
              <div class="ms-auto d-flex gap-2">
                <button class="btn btn-light btn-sm rounded-3 border-0" title="視訊通話">&#128247;</button>
                <button class="btn btn-light btn-sm rounded-3 border-0" title="更多選項">&#8942;</button>
              </div>
            </div>

            <!-- 訊息區 -->
            <div id="chat-messages"></div>

            <!-- 輸入列 -->
            <div class="chat-input-area mt-auto">
              <textarea id="msg-input" rows="1"
                placeholder="輸入訊息… (Enter 送出，Shift+Enter 換行)"></textarea>
              <button class="send-btn" onclick="sendMessage()" title="送出">&#10148;</button>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== Footer（同 login.html）===== -->
  <footer class="bg-white border-top py-5 mt-auto">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
          <a href="index.html"
            class="text-decoration-none d-flex align-items-center justify-content-center justify-content-md-start">
            <h3 class="nunito fst-italic mb-0 me-2 text-primary">Merge</h3>
            <span class="text-muted small">&copy; 2026</span>
          </a>
        </div>
        <div class="col-md-4 mb-3 mb-md-0">
          <ul class="list-unstyled d-flex justify-content-center mb-0 small">
            <li><a href="#" class="text-muted text-decoration-none px-2">服務條款</a></li>
            <li><a href="#" class="text-muted text-decoration-none px-2">隱私政策</a></li>
            <li><a href="#" class="text-muted text-decoration-none px-2">聯絡我們</a></li>
          </ul>
        </div>
        <div class="col-md-4 text-center text-md-end">
          <a href="#" class="text-muted me-3"><i class="bi bi-facebook"></i></a>
          <a href="#" class="text-muted me-3"><i class="bi bi-instagram"></i></a>
          <a href="#" class="text-muted"><i class="bi bi-github"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="./assets/js/navbar.js"></script>
  <script src="./assets/js/student-messages.js"></script>

</body>

</html>
