<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge | 訊息中心</title>
    <link rel="stylesheet" href="./assets/scss/all.scss">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <!-- 手機版頂部 Header -->
    <header class="student-mobile-header">
        <button class="btn-menu" id="sidebar-toggle">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="logo-text nunito fst-italic">Merge</span>
        <div style="width: 40px;"></div>
    </header>

    <!-- 手機版遮罩 -->
    <div class="student-overlay" id="sidebar-overlay"></div>

    <div class="student-layout">

        <!-- ===== 左側導覽列 ===== -->
        <aside class="student-sidebar" id="student-sidebar">

            <!-- Logo -->
            <div class="student-sidebar-logo">
                <div class="logo-icon">M</div>
                <div class="logo-text">
                    Merge
                    <span>學生後台</span>
                </div>
            </div>

            <!-- 選單 -->
            <nav class="flex-grow-1 py-2">
                <a href="StudentChat.html" class="student-nav-link active">
                    <span class="material-symbols-outlined">chat_bubble</span> 訊息中心
                </a>
                <a href="explore.html" class="student-nav-link">
                    <span class="material-symbols-outlined">search</span> 找老師
                </a>
                <a href="booking.html" class="student-nav-link">
                    <span class="material-symbols-outlined">calendar_month</span> 我的課程
                </a>
            </nav>

            <!-- 底部個人資訊 -->
            <div class="student-sidebar-footer" id="logout-btn">
                <img src="https://i.pravatar.cc/38?img=5" alt="頭像" class="student-avatar">
                <div class="student-info">
                    <div class="student-name" id="sidebar-name">載入中...</div>
                    <div class="student-role">學生</div>
                </div>
                <span class="material-symbols-outlined logout-icon">logout</span>
            </div>
        </aside>

        <!-- ===== 右側主內容區 ===== -->
        <main class="student-main bg-line-success">

            <!-- 頁面標題 -->
            <div class="student-chat-title">
                <h1 class="student-page-title sansTitle mb-0">訊息中心</h1>
            </div>

            <!-- 聊天主體 -->
            <div class="student-chat-wrap">

                <!-- ── 左：聯絡人列表 ── -->
                <div class="contacts-panel" id="contacts-panel">
                    <div class="search-wrap">
                        <input id="search-input" type="text" class="form-control" placeholder="搜尋老師或科目…">
                    </div>
                    <div id="contact-list"></div>
                </div>

                <!-- ── 右：聊天視窗 ── -->
                <div class="chat-panel" id="chat-panel">

                    <!-- 聊天 Header -->
                    <div class="chat-header">
                        <button class="chat-back-btn" id="chat-back-btn">
                            <span class="material-symbols-outlined">arrow_back</span>
                        </button>
                        <img id="chat-teacher-avatar" src="" alt="" class="chat-header-avatar">
                        <div class="chat-header-info">
                            <div id="chat-teacher-name" class="chat-header-name"></div>
                            <div id="chat-subject-tag" class="chat-subject-tag"></div>
                        </div>
                    </div>

                    <!-- 訊息區 -->
                    <div id="chat-messages" class="chat-messages"></div>

                    <!-- 輸入列 -->
                    <div class="chat-input-bar">
                        <label for="file-input" class="btn-icon" title="附加檔案">
                            <span class="material-symbols-outlined">attach_file</span>
                        </label>
                        <input type="file" id="file-input" class="d-none">

                        <textarea id="msg-input" class="msg-input" rows="1"
                            placeholder="輸入訊息… (Enter 送出，Shift+Enter 換行)"></textarea>

                        <button class="btn-send" onclick="sendMessage()" title="送出">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>

                </div>
                <!-- /.chat-panel -->

            </div>
            <!-- /.student-chat-wrap -->

        </main>
    </div>

    <script src="./assets/js/student-layout.js"></script>
    <script src="./assets/js/student-messages.js"></script>

</body>

</html>
