<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老師個人檔案 - [[${tutor.user.name}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tutor-header { background-color: #f8f9fa; padding: 40px 0; border-bottom: 1px solid #dee2e6; }
        .avatar-lg { width: 150px; height: 150px; object-fit: cover; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .schedule-slot { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 0.9rem; background: #fff; }
        .schedule-active { background-color: #e7f3ff; border-color: #0d6efd; color: #0d6efd; font-weight: bold; }
        .review-card { border-bottom: 1px solid #eee; padding: 15px 0; }
    	html {
	        scroll-behavior: smooth;
	    }
	    
	    /* 增加一點位移補償，避免標題被上方導覽列擋住 (如果有導覽列的話) */
	    #course-detail {
	        scroll-margin-top: 20px;
	    }
    </style>
</head>
<body>

<header class="tutor-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-3 text-center">
                <img th:src="${tutor.avatar != null ? tutor.avatar : 'https://via.placeholder.com/150'}" 
                     alt="老師頭像" class="rounded-circle avatar-lg">
            </div>
            <div class="col-md-9">
                <h1 class="display-6 fw-bold mb-2" th:text="${tutor.user.name}">老師姓名</h1>
                <h4 class="text-primary mb-3" th:text="${tutor.title}">吸睛標題內容</h4>
                <div>
                    <span class="badge bg-light text-dark border me-1">專業認證</span>
                    <span class="badge bg-info text-white" th:text="${'教學經驗: ' + (2026 - tutor.user.createdAt.atZone(T(java.time.ZoneId).of('Asia/Taipei')).year) + ' 年'}">經驗計算</span>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="container my-5">
    <div class="row">
        <div class="col-lg-8">
            <section class="mb-5">
                <h3 class="fw-bold mb-3"><i class="fa-solid fa-user-graduate me-2"></i>關於我</h3>
                <p class="lead text-secondary" th:text="${tutor.intro}" style="white-space: pre-wrap;">介紹內容...</p>
                
                <div class="card bg-light border-0 mt-4">
                    <div class="card-body">
                        <h5 class="fw-bold"><i class="fa-solid fa-certificate me-2 text-warning"></i>專業證照</h5>
                        <p class="mb-0 text-muted" th:text="${tutor.certificateName1}">證照清單...</p>
                    </div>
                </div>
            </section>

            <section class="mb-5" th:if="${tutor.videoUrl1 != null}">
                <h3 class="fw-bold mb-3"><i class="fa-solid fa-circle-user me-2"></i>自我介紹</h3>
                <div class="video-container">
                    <iframe th:src="${tutor.videoUrl1}" frameborder="0" allowfullscreen></iframe>
                </div>
            </section>

            <section class="mb-5" th:if="${tutor.videoUrl2 != null}">
                <h3 class="fw-bold mb-3"><i class="fa-solid fa-chalkboard-user me-2"></i>教學示範</h3>
                <div class="video-container">
                    <iframe th:src="${tutor.videoUrl2}" frameborder="0" allowfullscreen></iframe>
                </div>
            </section>
            <!-- 課程切換區塊 -->
			<section class="mb-4">
			    <h5 class="fw-bold"><i class="fa-solid fa-book me-2"></i>選擇你想上的課程</h5>
			    <div class="list-group">
			        <a th:each="course : ${courses}" 
					   th:href="@{/tutor/{id}(id=${tutor.id}, courseId=${course.id})} + '#course-detail'"
					   th:classappend="${selectedCourse != null && selectedCourse.id == course.id} ? 'active' : ''"
					   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
					    <span th:text="${course.name}">課程名稱</span>
					    <span class="badge bg-primary rounded-pill" th:text="${'$ ' + course.price}">$ 500</span>
					</a>
			    </div>
			</section>
			
			<section id="course-detail" class="card mb-5 border-0 shadow-sm" th:if="${selectedCourse != null}">
			    <div class="card-body">
			        <h4 class="card-title fw-bold" th:text="${selectedCourse.name}">課程名稱</h4>
			        <p class="card-text text-secondary" th:text="${selectedCourse.description}">這裡會顯示課程介紹...</p>
			        <div class="alert alert-info py-2">
			            <strong>單堂價格：</strong> <span th:text="${selectedCourse.price}">500</span> 元
			        </div>
			    </div>
			</section>

            <section>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold mb-0"><i class="fa-solid fa-star text-warning me-2"></i>學生評價</h3>
                    <span class="fs-5 fw-bold text-primary" th:text="${avgRating + ' / 5.0'}">4.9 / 5.0</span>
                </div>
                
                <div th:each="review : ${reviews}" class="review-card">
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold" th:text="${review.student.name}">學生姓名</span>
                        <span class="text-warning">
                            <span th:each="i : ${#numbers.sequence(1, 5)}">
                                <i th:class="${i <= review.rating ? 'fa-solid fa-star' : 'fa-regular fa-star'}"></i>
                            </span>
                        </span>
                    </div>
                    <p class="mt-2 text-secondary" th:text="${review.comment}">評論內容...</p>
                    <small class="text-muted" th:text="${#temporals.format(review.updatedAt, 'yyyy-MM-dd')}">2026-03-10</small>
                </div>
                
                <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-4 text-muted">
                    目前尚無評價。
                </div>
            </section>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm sticky-top" style="top: 20px;">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">可預約時段</h5>
                    <p class="text-muted small">標記藍色的時段老師目前在線：</p>
                    
                    <div class="row g-2 mb-4">
                        <div th:each="schedule : ${schedules}" class="col-6">
                            <div class="schedule-slot rounded schedule-active shadow-sm">
                                <span th:text="${'週' + schedule.weekday + ' ' + schedule.hour + ':00'}">週一 09:00</span>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 btn-lg mb-2">立即購買課程</button>
                    <div class="text-center">
                        <span class="text-muted small">目前餘額：<strong th:text="${tutor.user.wallet}">0</strong> 元</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white py-4">
    <div class="container text-center">
        <p>© 2026 老師個人化頁面系統</p>
    </div>
</footer>

</body>
</html>
