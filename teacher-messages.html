<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge | 訊息中心（老師）</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/all.scss">
</head>

<body class="teacher-chat-page">

    <!-- ===== Hamburger (mobile only) ===== -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="開啟選單">
        <span class="material-symbols-outlined">menu</span>
    </button>

    <!-- ===== 左側導覽列 ===== -->
    <aside class="teacher-sidebar" id="teacher-sidebar">
        <a href="teacher-dashboard.html" class="teacher-sidebar-logo" style="text-decoration: none; color: inherit;">
            <div class="logo-icon">M</div>
            <div class="logo-text">
                Merge
                <span>老師專用後台</span>
            </div>
        </a>
        <nav class="flex-grow-1 py-2">
            <a href="teacher-dashboard.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">grid_view</span>
                <span class="nav-label">控制台</span>
            </a>
            <a href="teacher-schedule.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">calendar_month</span>
                <span class="nav-label">行程與排課</span>
            </a>
            <a href="teacher-courses.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">menu_book</span>
                <span class="nav-label">課程管理</span>
            </a>
            <a href="teacher-reviews.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">assignment</span>
                <span class="nav-label">報告與評價</span>
            </a>
            <a href="teacher-income.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">account_balance_wallet</span>
                <span class="nav-label">收益與績效</span>
            </a>
            <a href="teacher-messages.html" class="teacher-nav-link active">
                <span class="material-symbols-outlined">chat_bubble</span>
                <span class="nav-label">訊息中心</span>
            </a>
            <a href="teacher-settings.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">settings</span>
                <span class="nav-label">設定</span>
            </a>
            <a href="index.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">home</span>
                <span class="nav-label">返回首頁</span>
            </a>
        </nav>
        <div class="teacher-sidebar-footer" id="logout-btn">
            <img src="https://i.pravatar.cc/38?img=12" alt="頭像" class="teacher-avatar" id="sidebarAvatar">
            <div class="teacher-info">
                <div class="teacher-name" id="sidebarName">老師</div>
                <div class="teacher-role">老師</div>
            </div>
            <span class="material-symbols-outlined logout-icon">logout</span>
        </div>
    </aside>

    <!-- ===== Sidebar overlay (mobile) ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== 主內容區（對話列表 + 聊天視窗）===== -->
    <main class="chat-layout">

        <!-- 中欄：對話列表 -->
        <section class="chat-list-panel">
            <div class="chat-list-header">
                <h2 class="chat-list-title"><span>訊息中心</span></h2>
            </div>

            <!-- 搜尋框 -->
            <div class="chat-search-wrap">
                <span class="material-symbols-outlined chat-search-icon">search</span>
                <input type="text" class="chat-search-input" placeholder="搜尋學生或科目…" id="searchInput">
            </div>

            <!-- 對話列表 -->
            <ul class="chat-list" id="chatList"></ul>
        </section>

        <!-- 右欄：聊天視窗 -->
        <section class="chat-window">
            <!-- 頂部 header -->
            <div class="chat-header" id="chatHeader">
                <button class="chat-back-btn" id="chatBackBtn" aria-label="返回">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div class="contact-avatar-wrap">
                    <img src="https://i.pravatar.cc/44?img=20" alt="學生" class="contact-avatar" id="headerAvatar">
                </div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="headerName">學生</div>
                    <span class="subject-tag" id="headerTag"></span>
                </div>
            </div>

            <!-- 訊息區 -->
            <div class="chat-messages" id="chatMessages">
                <!-- 訊息由 JS 動態渲染 -->
            </div>

            <!-- 輸入列 -->
            <div class="chat-input-bar">
                <button class="attach-btn" title="附件">
                    <span class="material-symbols-outlined">attach_file</span>
                </button>
                <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.zip">
                <input type="text" class="chat-input" id="msgInput"
                    placeholder="輸入訊息… (Enter 送出、Shift+Enter 換行)">
                <button class="send-btn" id="sendBtn">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/navbar.js"></script>
    <script src="./assets/js/TeacherChat.js"></script>
    <script>
        // RWD interactions
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const chatBackBtn = document.getElementById('chatBackBtn');

        hamburgerBtn.addEventListener('click', () => {
            document.body.classList.toggle('sidebar-open');
        });

        sidebarOverlay.addEventListener('click', () => {
            document.body.classList.remove('sidebar-open');
        });

        chatBackBtn.addEventListener('click', () => {
            document.body.classList.remove('mobile-show-chat');
        });

        document.getElementById('chatList').addEventListener('click', (e) => {
            if (window.innerWidth < 576) {
                document.body.classList.add('mobile-show-chat');
            }
        });
    </script>
</body>

</html>
