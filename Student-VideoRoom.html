q<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視訊教室 - Merge</title>
    <link rel="stylesheet" href="./assets/scss/all.scss" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body style="padding-top: 62px;">

    <!-- ── Navbar ─────────────────────────────────────────── -->
    <header class="border-bottom py-2 fixed-top navbar-light bg-light">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex">
                    <a href="index.html" class="text-decoration-none">
                        <h1 class="nunito fst-italic display-5 pt-2">Merge</h1>
                    </a>
                </div>
                <nav class="ms-auto pt-2">
                    <ul class="list-unstyled d-flex align-items-center mb-0">
                        <li><a href="StudentChat.html" class="text-decoration-none px-3 ms-auto">訊息中心</a></li>
                        <li><a href="booking.html" class="text-decoration-none px-3">我的課程</a></li>
                        <li id="auth-nav-item">
                            <a href="login.html" class="text-decoration-none px-3 pe-0 text-primary fw-bold">LOGIN</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- ── Pre-join Overlay ───────────────────────────────── -->
    <div id="prejoin-overlay">
        <div class="prejoin-card">

            <div class="prejoin-header">
                <h2>視訊教室</h2>
                <p class="prejoin-booking"><span id="prejoin-course-name">載入中...</span></p>
            </div>

            <!-- 本地鏡頭預覽 -->
            <div class="prejoin-preview-wrap">
                <video id="prejoin-video" autoplay playsinline muted></video>
                <div id="prejoin-cam-off-icon">
                    <i class="bi bi-camera-video-off"></i>
                </div>
            </div>

            <!-- 麥克風 / 攝影機切換 -->
            <div class="prejoin-toggles">
                <button id="btn-pre-mic" class="ctrl-btn" title="麥克風">
                    <i class="bi bi-mic-fill"></i>
                </button>
                <button id="btn-pre-cam" class="ctrl-btn" title="攝影機">
                    <i class="bi bi-camera-video-fill"></i>
                </button>
            </div>

            <!-- 進入按鈕 -->
            <button id="btn-enter-room" class="btn-enter-room">
                <i class="bi bi-play-fill"></i> 進入教室
            </button>

        </div>
    </div>

    <!-- ── Room Layout ────────────────────────────────────── -->
    <div id="room-layout" style="display: none;">

        <!-- Left: Video Panel -->
        <section id="video-panel">

            <!-- Status Badge -->
            <div id="room-status-badge" class="room-status-badge waiting">
                <span id="status-icon">⏳</span>
                <span id="status-text">等待對方加入...</span>
            </div>

            <!-- Ended Overlay -->
            <div id="ended-overlay">
                <div class="ended-card">
                    <h2>🎓 課程已結束</h2>
                    <p>感謝參與本次課程！</p>
                    <a href="booking.html">回到我的課程</a>
                </div>
            </div>

            <!-- Remote Video -->
            <div id="remote-video-wrapper">
                <div id="remote-placeholder">
                    <i class="bi bi-person-video3"></i>
                    <p>等待對方開啟視訊...</p>
                </div>
                <video id="remote-video" autoplay playsinline></video>

                <!-- Local Video PiP -->
                <div id="local-video-wrapper">
                    <video id="local-video" autoplay playsinline muted></video>
                    <div id="local-placeholder-icon">
                        <i class="bi bi-camera-video-off"></i>
                    </div>
                </div>
            </div>

            <!-- Control Bar -->
            <div id="control-bar">
                <button id="btn-mic" class="ctrl-btn" title="靜音">
                    <i class="bi bi-mic-fill"></i>
                </button>
                <button id="btn-cam" class="ctrl-btn" title="關閉鏡頭">
                    <i class="bi bi-camera-video-fill"></i>
                </button>
                <button id="btn-screen" class="ctrl-btn" title="分享螢幕">
                    <i class="bi bi-display"></i>
                </button>
                <button id="btn-hangup" class="ctrl-btn danger" title="掛斷">
                    <i class="bi bi-telephone-x-fill"></i>
                </button>
            </div>

        </section>

        <!-- Right: Chat Panel -->
        <aside id="chat-panel" style="margin-top: 35px;margin-right: 30px;margin-bottom: 40px;border-radius: 10px;">

            <div id="chat-header">
                <div>
                    <h5>課程聊天室 💬</h5>
                    <small>預約編號 #<span id="chat-booking-id">—</span></small>
                </div>
                <span id="peer-status-dot" class="peer-dot offline" title="對方連線狀態"></span>
            </div>

            <div id="chat-messages"></div>

            <div id="chat-input-area">
                <label id="btn-attach" title="附加檔案">
                    <i class="bi bi-paperclip"></i>
                    <input type="file" id="file-input" hidden
                           accept="image/*,audio/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip">
                </label>
                <input id="chat-text-input" type="text"
                       placeholder="輸入訊息，按 Enter 送出..." autocomplete="off">
                <button id="btn-send" title="送出">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>

        </aside>

    </div>

    <!-- ── Scripts ────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="./assets/js/video-room.js"></script>

</body>
</html>
