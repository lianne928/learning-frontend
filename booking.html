<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>預約課程 - Merge</title>
    <link rel="stylesheet" href="./assets/scss/all.scss" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>

  <body>
    <header class="border-bottom py-2 fixed-top navbar-light bg-light">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <div class="d-flex">
            <a href="index.html" class="text-decoration-none">
              <h1 class="nunito fst-italic display-5 pt-2">Merge</h1>
            </a>
          </div>
          <nav class="ms-auto pt-2">
            <ul class="list-unstyled d-flex align-items-center mb-0">
              <li>
                <a href="explore.html" class="text-decoration-none px-3"
                  >我要找老師</a
                >
              </li>
              <li>
                <a href="register.html" class="text-decoration-none px-3"
                  >註冊送代幣</a
                >
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main class="pt-5 mt-5">
      <div class="container">
        <div class="mt-5">
          <div class="d-inline-block text-primary">
            <p class="display-1 mb-0 sansTitle">Reservation</p>
          </div>
          <p class="fw-light ms-2 d-inline-block sansTeg">預約單</p>
        </div>

        <div class="row pt-5">
          <div class="col-12 col-md-8">
            <div class="border-top py-4">
              <div class="border-bottom">
                <div class="d-flex align-items-center mt-3">
                  <p
                    id="tutorName"
                    class="ms-1 mb-4 tilt-warp display-3 border rounded-circle d-inline-block text-primary"
                  >
                    Ms.Emma
                  </p>
                  <span id="courseName" class="ms-2 fw-light">低年級英文</span>
                  <div class="ms-auto row">
                    <div class="col">
                      <p class="mb-0">正式課程單價</p>
                      <div class="text-end">
                        <p
                          id="coursePrice"
                          class="sansTeg fs-3 text-end d-inline-block"
                        >
                          500
                        </p>
                        <span style="font-size: 12px"> / 點</span>
                      </div>
                    </div>
                    <div class="col">
                      <p class="mb-0">體驗課程單價</p>
                      <p class="sansTeg fs-3 text-end">
                        300<span style="font-size: 12px"> / 點</span>
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <div class="pb-4">
                <p class="ms-1 mt-4">✦ 已選擇的預約時間</p>
                <div
                  id="selectedList"
                  class="row row-cols-md-3 g-3 sansTeg pt-4 ms-4"
                ></div>
              </div>

              <div class="border-top">
                <p class="ms-1 pt-4">✦ 請選擇預約時間</p>
                <div class="d-flex align-items-center gap-2 mb-3">
                  <button
                    id="prevWeekBtn"
                    type="button"
                    class="btn btn-outline-dark rounded-3"
                  >
                    ←
                  </button>

                  <div
                    id="weekBar"
                    class="d-flex gap-2 overflow-auto flex-grow-1"
                  ></div>

                  <button
                    id="nextWeekBtn"
                    type="button"
                    class="btn btn-outline-dark rounded-3"
                  >
                    →
                  </button>
                </div>
                <div id="canSelect" class="row g-3 mt-2"></div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="border-top border-bottom pt-3 pb-4">
              <div class="d-flex justify-content-between border-bottom py-3">
                <div>
                  <p
                    class="border d-inline-block px-3 bg-light py-1 rounded-pill"
                  >
                    課程總時長
                  </p>
                </div>
                <div>
                  <p id="totalMinutes" class="sansTeg d-inline-block fs-4">0</p>
                  <span class="fw-light"> / mins</span>
                </div>
              </div>

              <div class="d-flex justify-content-between border-bottom py-3">
                <div class="pt-3">
                  <p
                    class="border d-inline-block px-3 bg-light py-1 rounded-pill"
                  >
                    預約總堂數
                  </p>
                </div>
                <div class="pt-3">
                  <p id="totalLessons" class="sansTeg d-inline-block fs-4">0</p>
                  <span class="fw-light"> / 堂</span>
                </div>
              </div>

              <div class="d-flex">
                <div class="mt-auto ms-auto">
                  <div class="d-flex flex-column align-items-center">
                    <p class="mb-0 ms-auto mt-5">共計點數花費</p>
                    <div class="d-flex align-items-center">
                      <div class="ms-auto">
                        <p
                          id="totalPoints"
                          class="sansTeg display-2 text-primary d-inline-block mb-0 pe-2"
                        >
                          0
                        </p>
                        <span>/ 點</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <button
                id="bookingBtn"
                type="button"
                class="btn btn-success border border-1 p-3 w-100"
              >
                <p class="mb-0 px-5 nunito">確定預約</p>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-white border-top py-5 mt-auto">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
            <a
              href="index.html"
              class="text-decoration-none d-flex align-items-center justify-content-center justify-content-md-start"
            >
              <h3 class="nunito fst-italic mb-0 me-2 text-primary">Merge</h3>
              <span class="text-muted small">&copy; 2026</span>
            </a>
          </div>
          <div class="col-md-4 mb-3 mb-md-0">
            <ul class="list-unstyled d-flex justify-content-center mb-0 small">
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >服務條款</a
                >
              </li>
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >隱私政策</a
                >
              </li>
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >聯絡我們</a
                >
              </li>
            </ul>
          </div>
          <div class="col-md-4 text-center text-md-end">
            <a href="#" class="text-muted me-3"
              ><i class="bi bi-facebook"></i
            ></a>
            <a href="#" class="text-muted me-3"
              ><i class="bi bi-instagram"></i
            ></a>
            <a href="#" class="text-muted"><i class="bi bi-github"></i></a>
          </div>
        </div>
      </div>
    </footer>

    <script src="./assets/js/navbar.js"></script>
    <script src="./assets/js/booking.js"></script>
  </body>
</html>
