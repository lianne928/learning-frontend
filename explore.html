<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>探索好老師 - Merge</title>
    <link rel="stylesheet" href="./assets/scss/all.scss" />
  </head>

  <body style="padding-top: 70px">
    <!-- Toast 容器 -->
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 9999"
      id="toastContainer"
    ></div>

    <header class="border-bottom py-2 fixed-top navbar-light bg-light">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <div class="d-flex">
            <a href="index.html" class="text-decoration-none">
              <h1 class="nunito fst-italic display-5 pt-2">Merge</h1>
            </a>
          </div>
          <nav class="ms-auto pt-2">
            <ul class="list-unstyled d-flex align-items-center mb-0">
              <li>
                <a href="explore.html" class="text-decoration-none px-3"
                  >我要找老師</a
                >
              </li>
              <li>
                <a href="register.html" class="text-decoration-none px-3"
                  >註冊送代幣</a
                >
              </li>
              <li id="auth-nav-item">
                <a class="fancy" href="login.html">
                  <span class="top-key"></span>
                  <span class="text">登入</span>
                  <span class="bottom-key-1"></span>
                  <span class="bottom-key-2"></span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <div class="explore-container">
      <!-- 頁首 + 搜尋區塊（米白奶油色 + Blob 風格）-->
      <div class="explore-hero">
        <!-- Blob 裝飾 -->
        <div class="explore-blob explore-blob-1"></div>
        <div class="explore-blob explore-blob-2"></div>
        <div class="explore-blob explore-blob-3"></div>
        <div class="explore-blob explore-blob-4"></div>

        <!-- 標題 -->
        <div class="explore-hero-title">
          <span class="explore-hero-badge">✦ 兒童英語家教平台</span>
          <h1>探索<span class="explore-hero-highlight">好老師</span> ✦</h1>
          <p>
            在 Merge 找到最適合孩子的啟蒙導師，讓學習變成每天最期待的遊戲時間！
          </p>
        </div>

        <!-- 搜尋列 -->
        <div class="explore-search-bar">
          <div class="search-item">
            <img
              src="./assets/img/loupe.png"
              class="search-icon-img"
              alt="搜尋"
              style="
                width: 24px;
                height: 24px;
                object-fit: contain;
                flex-shrink: 0;
              "
            />
            <input
              type="text"
              id="searchInput"
              placeholder="搜尋老師或課程名稱..."
            />
          </div>
          <div class="divider"></div>

          <div class="search-item">
            <img
              src="./assets/img/curriculum.png"
              class="search-icon-img"
              alt="課程"
              style="
                width: 24px;
                height: 24px;
                object-fit: contain;
                flex-shrink: 0;
              "
            />
            <select id="subjectSelect">
              <option value="">所有課程</option>
              <option value="11">低年級課程</option>
              <option value="12">中年級課程</option>
              <option value="13">高年級課程</option>
              <option value="21">GEPT 全民英檢</option>
              <option value="22">YLE 劍橋兒童</option>
              <option value="23">國中先修</option>
              <option value="31">其他科目</option>
            </select>
          </div>
          <div class="divider"></div>

          <div class="search-item">
            <img
              src="./assets/img/calendar.png"
              class="search-icon-img"
              alt="日期"
              style="
                width: 24px;
                height: 24px;
                object-fit: contain;
                flex-shrink: 0;
              "
            />
            <select id="daySelect">
              <option value="">所有日期</option>
              <option value="1">星期一</option>
              <option value="2">星期二</option>
              <option value="3">星期三</option>
              <option value="4">星期四</option>
              <option value="5">星期五</option>
              <option value="6">星期六</option>
              <option value="7">星期日</option>
            </select>
          </div>
          <div class="divider"></div>

          <div class="search-item">
            <img
              src="./assets/img/clock.png"
              class="search-icon-img"
              alt="時段"
              style="
                width: 24px;
                height: 24px;
                object-fit: contain;
                flex-shrink: 0;
              "
            />
            <select id="timeSelect">
              <option value="">所有時段</option>
              <option value="morning">上午 (09:00 - 13:00)</option>
              <option value="afternoon">下午 (13:00 - 17:00)</option>
              <option value="evening">晚上 (17:00 - 21:00)</option>
            </select>
          </div>

          <button class="btn-search" id="btnSearch">開始尋找</button>
        </div>
      </div>

      <!-- 課程卡片區 -->
      <section>
        <div class="container">
          <div
            id="course-list-container"
            class="row row-cols-lg-4 row-cols-md-2 row-cols-1 g-4"
          >
            <h3 style="text-align: center; width: 100%; color: #666">
              ⏳ 課程資料載入中...
            </h3>
          </div>

          <!-- 分頁控制 -->
          <div
            id="pagination-container"
            class="d-flex justify-content-center mt-4"
            style="display: none"
          >
            <!-- 分頁按鈕會動態生成 -->
          </div>
        </div>
      </section>
    </div>

    <footer class="bg-white border-top py-5 mt-auto">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
            <a
              href="index.html"
              class="text-decoration-none d-flex align-items-center justify-content-center justify-content-md-start"
            >
              <h3 class="nunito fst-italic mb-0 me-2 text-primary">Merge</h3>
              <span class="text-muted small">&copy; 2026</span>
            </a>
          </div>
          <div class="col-md-4 mb-3 mb-md-0">
            <ul class="list-unstyled d-flex justify-content-center mb-0 small">
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >服務條款</a
                >
              </li>
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >隱私政策</a
                >
              </li>
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >聯絡我們</a
                >
              </li>
            </ul>
          </div>
          <div class="col-md-4 text-center text-md-end">
            <a href="#" class="text-muted me-3"
              ><i class="bi bi-facebook"></i
            ></a>
            <a href="#" class="text-muted me-3"
              ><i class="bi bi-instagram"></i
            ></a>
            <a href="#" class="text-muted"><i class="bi bi-github"></i></a>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/navbar.js"></script>
    <script src="./assets/js/explore.js"></script>
  </body>
</html>
