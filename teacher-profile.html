<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/scss/all.scss" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>老師個人專頁 - Merge</title>
</head>

<body style="padding-top: 70px;">

    <!-- 導覽列（與 index.html 一致） -->
    <header class="border-bottom py-2 fixed-top navbar-light bg-light">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex">
                    <a href="index.html" class="text-decoration-none">
                        <h1 class="nunito fst-italic display-5 pt-2">Merge</h1>
                    </a>
                </div>
                <nav class="ms-auto pt-2">
                    <ul class="list-unstyled d-flex align-items-center mb-0">
                        <li>
                            <a href="#" class="text-decoration-none px-3 ms-auto">我要找學生</a>
                        </li>
                        <li>
                            <a href="explore.html" class="text-decoration-none px-3">我要找老師</a>
                        </li>
                        <li>
                            <a href="#" class="text-decoration-none px-3">註冊送代幣</a>
                        </li>
                        <li id="auth-nav-item">
                            <a href="login.html" class="text-decoration-none px-3 pe-0 text-primary fw-bold">LOGIN</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主體 -->
    <div class="teacher-profile-wrapper">

        <main class="profile-main">

            <!-- 老師基本資料 -->
            <section class="profile-card">
                <div class="tutor-header">
                    <div class="tutor-avatar-wrap">
                        <img id="tutor-avatar" src="https://via.placeholder.com/120" alt="老師頭像">
                    </div>
                    <div class="tutor-meta">
                        <h2 id="tutor-name">載入中...</h2>
                        <p id="tutor-headline" class="tutor-headline"></p>
                        <span id="tutor-rating" class="tutor-rating"></span>
                        <p id="tutor-intro" class="tutor-intro"></p>
                    </div>
                </div>
            </section>

            <!-- 課程選擇 -->
            <section class="profile-card">
                <h3 class="profile-section-title">選擇你想上的課程</h3>
                <div id="course-buttons" class="course-btn-group"></div>
                <div class="course-desc-box">
                    <h4 id="course-name">載入中...</h4>
                    <p id="course-desc"></p>
                </div>
            </section>

            <!-- 影音大廳 -->
            <section class="profile-card">
                <h3 class="profile-section-title">影音大廳</h3>
                <div id="videos-container" class="videos-grid"></div>
            </section>

            <!-- 關於老師 -->
            <section class="profile-card">
                <h3 class="profile-section-title">關於老師</h3>
                <ul id="certificates-container" class="certificates-list"></ul>
            </section>

            <!-- 課表 -->
            <section class="profile-card">
                <h3 class="profile-section-title">近期可預約時段</h3>
                <div id="schedule-container" class="schedule-grid"></div>
            </section>

            <!-- 評價 -->
            <section class="profile-card">
                <h3 class="profile-section-title">上過這堂課的家長評價</h3>
                <div id="reviews-container"></div>
            </section>

        </main>

        <!-- 右側價格欄 -->
        <aside class="teacher-aside">
            <div class="price-card">
                <h3>預約上課</h3>

                <div class="price-row">
                    <div>
                        <strong id="price-single">NT$ -</strong><br>
                        <small>1 堂正式課</small>
                    </div>
                </div>

                <div class="price-row">
                    <div>
                        <strong id="price-5">NT$ -</strong><br>
                        <small>5 堂正式課</small>
                    </div>
                    <span class="discount-badge">95折</span>
                </div>

                <div class="price-row">
                    <div>
                        <strong id="price-10">NT$ -</strong><br>
                        <small>10 堂正式課</small>
                    </div>
                    <span class="discount-badge">9折</span>
                </div>

                <button id="btn-booking" class="btn-booking-main mt-3">
                    立即預約 👉
                </button>

                <div class="secure-badge">
                    🔒 256-bit 加密安全結帳<br>ECPay
                </div>
            </div>
        </aside>

    </div>

    <script src="assets/js/teacher-profile.js"></script>
    <script src="./assets/js/navbar.js"></script>
</body>

</html>
