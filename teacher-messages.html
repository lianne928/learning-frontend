<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge | 訊息中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/all.scss">
</head>
<body>

<!-- 手機版頂部 Header -->
<header class="teacher-mobile-header">
    <button class="btn btn-light border-0" id="sidebar-toggle">
        <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="logo-text">Merge</span>
    <div style="width: 40px;"></div>
</header>

<!-- 手機版遮罩 -->
<div class="teacher-overlay" id="sidebar-overlay"></div>

<div class="teacher-layout">

    <!-- ===== 左側導覽列 ===== -->
    <aside class="teacher-sidebar" id="teacher-sidebar">

        <!-- Logo -->
        <div class="teacher-sidebar-logo">
            <div class="logo-icon">M</div>
            <div class="logo-text">
                Merge
                <span>老師專用後台</span>
            </div>
        </div>

        <!-- 選單 -->
        <nav class="flex-grow-1 py-2">
            <a href="teacher-dashboard.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">grid_view</span> 控制台
            </a>
            <a href="teacher-schedule.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">calendar_month</span> 行程與排課
            </a>
            <a href="teacher-courses.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">menu_book</span> 課程管理
            </a>
            <a href="teacher-reviews.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">assignment</span> 報告與評價
            </a>
            <a href="teacher-income.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">account_balance_wallet</span> 收益與績效
            </a>
            <a href="teacher-messages.html" class="teacher-nav-link active">
                <span class="material-symbols-outlined">chat_bubble</span> 訊息中心
            </a>
            <a href="teacher-settings.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">settings</span> 設定
            </a>
        </nav>

        <!-- 底部個人資訊 -->
        <div class="teacher-sidebar-footer" id="logout-btn">
            <img id="sidebar-avatar" src="https://via.placeholder.com/38" alt="頭像" class="teacher-avatar">
            <div class="teacher-info">
                <div class="teacher-name" id="sidebar-name">載入中...</div>
                <div class="teacher-role">老師</div>
            </div>
            <span class="material-symbols-outlined logout-icon">logout</span>
        </div>
    </aside>

    <!-- ===== 右側主內容區 ===== -->
    <main class="teacher-main">

        <!-- 頁面標題 -->
        <div class="student-chat-title">
            <h1 class="teacher-page-title sansTitle mb-0">訊息中心</h1>
        </div>

        <!-- 聊天主體 -->
        <div class="student-chat-wrap">

            <!-- ── 左：聯絡人列表 ── -->
            <div class="contacts-panel" id="contacts-panel">
                <div class="search-wrap">
                    <input id="search-input" type="text" class="form-control" placeholder="搜尋學生或科目…">
                </div>
                <div id="contact-list"></div>
            </div>

            <!-- ── 右：聊天視窗 ── -->
            <div class="chat-panel" id="chat-panel">

                <!-- 聊天 Header -->
                <div class="chat-header">
                    <button class="chat-back-btn" id="chat-back-btn">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </button>
                    <img id="chat-student-avatar" src="" alt="" class="chat-header-avatar">
                    <div class="chat-header-info">
                        <div id="chat-student-name" class="chat-header-name"></div>
                        <div id="chat-subject-tag" class="chat-subject-tag"></div>
                    </div>
                </div>

                <!-- 訊息區 -->
                <div id="chat-messages" class="chat-messages"></div>

                <!-- 輸入列 -->
                <div class="chat-input-bar">
                    <label for="file-input" class="btn-icon" title="附加檔案">
                        <span class="material-symbols-outlined">attach_file</span>
                    </label>
                    <input type="file" id="file-input" class="d-none">

                    <textarea id="msg-input" class="msg-input" rows="1"
                        placeholder="輸入訊息… (Enter 送出，Shift+Enter 換行)"></textarea>

                    <button class="btn-send" onclick="sendMessage()" title="送出">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>

            </div>
            <!-- /.chat-panel -->

        </div>
        <!-- /.student-chat-wrap -->

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="./assets/js/teacher-layout.js"></script>
<script src="./assets/js/teacher-messages.js"></script>
</body>
</html>
