<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge | 課程管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/all.scss">
</head>
<body>

<header class="teacher-mobile-header">
    <button class="btn btn-light border-0" id="sidebar-toggle">
        <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="logo-text">Merge</span>
    <div style="width: 40px;"></div>
</header>

<div class="teacher-overlay" id="sidebar-overlay"></div>

<div class="teacher-layout">

    <aside class="teacher-sidebar" id="teacher-sidebar">
        <div class="teacher-sidebar-logo">
            <div class="logo-icon">M</div>
            <div class="logo-text">Merge<span>老師專用後台</span></div>
        </div>
        <nav class="flex-grow-1 py-2">
            <a href="teacher-dashboard.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">grid_view</span> 控制台
            </a>
            <a href="teacher-schedule.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">calendar_month</span> 行程與排課
            </a>
            <a href="teacher-courses.html" class="teacher-nav-link active">
                <span class="material-symbols-outlined">menu_book</span> 課程管理
            </a>
            <a href="teacher-reviews.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">assignment</span> 報告與評價
            </a>
            <a href="teacher-income.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">account_balance_wallet</span> 收益與績效
            </a>
            <a href="teacher-messages.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">chat_bubble</span> 訊息中心
            </a>
            <a href="teacher-settings.html" class="teacher-nav-link">
                <span class="material-symbols-outlined">settings</span> 設定
            </a>
        </nav>
        <div class="teacher-sidebar-footer" id="logout-btn">
            <img id="sidebar-avatar" src="https://placehold.co/38" alt="頭像" class="teacher-avatar">
            <div class="teacher-info">
                <div class="teacher-name" id="sidebar-name">載入中...</div>
                <div class="teacher-role">老師</div>
            </div>
            <span class="material-symbols-outlined logout-icon">logout</span>
        </div>
    </aside>

    <main class="teacher-main">

        <h1 class="teacher-page-title">課程管理</h1>
        <p class="teacher-page-subtitle">管理所有課程與學生預約狀況</p>

        <!-- 分頁標籤 -->
        <div class="schedule-tabs">
            <button class="schedule-tab-btn active" data-tab="courses">
                <span class="material-symbols-outlined">menu_book</span> 課程卡片
            </button>
            <button class="schedule-tab-btn" data-tab="history">
                <span class="material-symbols-outlined">history</span> 歷史訂單
            </button>
        </div>

        <!-- 分頁一：課程卡片 -->
        <div class="tab-panel active" id="tab-courses">
            <div id="course-cards-container" class="course-cards-grid">
                <div class="text-center text-muted py-4" style="grid-column: span 2;">⏳ 載入中...</div>
            </div>
        </div>

        <!-- 分頁二：歷史訂單 -->
        <div class="tab-panel" id="tab-history">
            <div class="teacher-card">
                <div class="teacher-card-header">
                    <h3>歷史訂單</h3>
                    <span id="history-count" style="font-size:0.8rem; color:#94a3b8; font-weight:700;">0 筆</span>
                </div>
                <div id="history-list">
                    <div class="text-center text-muted py-4">⏳ 載入中...</div>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- 預約詳細 Modal -->
<div class="modal fade" id="bookingDetailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content" style="border-radius:20px; border:3px solid #1A2238;">
            <div class="modal-header border-0 pb-0">
                <div>
                    <h5 class="modal-title fw-900 mb-0" style="color:#1A2238;" id="modal-course-name">課程名稱</h5>
                    <p class="mb-0 mt-1" style="font-size:0.82rem; color:#94a3b8;">
                        <span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">person</span>
                        <span id="modal-student-name">學生名稱</span>
                    </p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- 堂數統計 -->
                <div class="d-flex gap-3 mb-4" id="modal-stats"></div>
                <!-- 預約列表 -->
                <div id="modal-booking-list">
                    <div class="text-center text-muted py-4">⏳ 載入中...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="./assets/js/navbar.js"></script>
<script src="./assets/js/teacher-layout.js"></script>
<script src="./assets/js/teacher-courses.js"></script>
</body>
</html>
